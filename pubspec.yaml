name: dengim
description: DENGİM - Modern Premium Tanışma Uygulaması
publish_to: 'none'
version: 1.0.3+10

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  
  # Veri Saklama
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_auth_platform_interface: any
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_remote_config: ^5.1.3
  firebase_analytics: ^11.2.0
  flutter_facebook_auth: ^7.1.5
  flutter_local_notifications: ^17.2.2
  google_sign_in: ^6.2.1
  image_picker: ^1.0.7
  video_player: ^2.8.2
  
  # Ödeme Sistemi (Native IAP)
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.3.18
  in_app_purchase_android: ^0.3.0
  
  # RTC (Voice & Video)
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1
  
  # Bağlantı Durumu
  connectivity_plus: ^6.0.3

  # Reklamlar (Admob)
  google_mobile_ads: ^5.0.0
  
  # Ücretsiz Harita - OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  
  # Swipe Kartları
  flutter_card_swiper: ^7.0.0
  
  # State Management
  provider: ^6.1.2

  # Görsel Optimizasyonu
  cached_network_image: ^3.4.1
  flutter_blurhash: ^0.8.2

  # Yardımcı Araçlar
  logger: ^2.4.0
  intl: ^0.19.0
  url_launcher: ^6.2.4
  http: ^1.6.0
  share_plus: ^10.1.4

  # Animasyonlar
  shimmer: ^3.0.0
  confetti: ^0.7.0
  lottie: ^3.0.0

  # Ses Kaydı & Çalma
  record: ^5.1.2
  just_audio: ^0.9.39
  path_provider: ^2.1.2
  agora_token_generator: ^0.0.1

  # Swipe Actions
  flutter_slidable: ^3.1.0
  purchases_flutter: ^8.11.0
  cloud_functions: ^5.6.2
  firebase_crashlytics: ^4.3.10
  flutter_image_compress: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

dependency_overrides:
  geolocator_android: 4.6.2
  record_linux: ^1.3.0
  record_android: 1.3.0

# ═══════════════════════════════════════════════════════
# LAUNCHER ICONS — B&W Modern (Adaptive Icon + Round)
# ═══════════════════════════════════════════════════════
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  # Adaptive Icon (Android 8.0+) — black background, icon as foreground
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
  # Round icon (some Android launchers use this)
  image_path_android: "assets/icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#000000"
    theme_color: "#000000"

# ═══════════════════════════════════════════════════════
# NATIVE SPLASH — Pure White (matches our B&W design)
# ═══════════════════════════════════════════════════════
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#000000"
    color: "#000000"
  web: false
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/demo_profiles/
