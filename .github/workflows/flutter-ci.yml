name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: 📦 Install Dependencies
      run: flutter pub get
      
    - name: 🔍 Analyze Code
      run: flutter analyze --no-fatal-infos --no-fatal-warnings
      continue-on-error: true
      
    - name: 🧪 Run Tests
      run: flutter test
      continue-on-error: true
      
    - name: ✅ Check Formatting
      run: dart format --set-exit-if-changed .
      continue-on-error: true

  build-apk:
    name: Build APK
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: 📦 Install Dependencies
      run: flutter pub get

    - name: 📦 Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: 🔧 Patch plugin build.gradle files
      run: |
        echo "Patching all plugins..."
        # Fix flutter.compileSdkVersion / minSdkVersion / ndkVersion
        find $HOME/.pub-cache -name "build.gradle" -path "*/android/*" | while read f; do
          if grep -q "flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.ndkVersion" "$f" 2>/dev/null; then
            echo "  Patching SDK versions: $f"
            sed -i 's/flutter\.compileSdkVersion/35/g' "$f"
            sed -i 's/flutter\.minSdkVersion/23/g' "$f"
            sed -i 's/flutter\.ndkVersion/"25.1.8937393"/g' "$f"
          fi
        done
        
        # Fix Kotlin version references in plugin build.gradle files
        find $HOME/.pub-cache -name "build.gradle" -path "*/android/*" | while read f; do
          if grep -q "ext\.kotlin_version\|rootProject\.ext\.kotlin_version" "$f" 2>/dev/null; then
            echo "  Patching Kotlin version: $f"
            sed -i 's/rootProject\.ext\.kotlin_version/"2.0.21"/g' "$f"
            sed -i "s/\$rootProject\.ext\.kotlin_version/\"2.0.21\"/g" "$f"
            sed -i "s/ext\.kotlin_version = .*/ext.kotlin_version = '2.0.21'/g" "$f"
          fi
        done
        
        # Add android namespace to plugins missing it (AGP 8+ requirement)
        find $HOME/.pub-cache -name "build.gradle" -path "*/android/*" | while read f; do
          if grep -q "^android {" "$f" 2>/dev/null; then
            if ! grep -q "namespace" "$f" 2>/dev/null; then
              PKG=$(grep -r "package=" "$(dirname "$f")/../src/main/AndroidManifest.xml" 2>/dev/null | head -1 | sed 's/.*package="\([^"]*\)".*/\1/')
              if [ -n "$PKG" ]; then
                echo "  Adding namespace '$PKG' to: $f"
                sed -i "s/^android {/android {\n    namespace \"$PKG\"/" "$f"
              fi
            fi
          fi
        done
        echo "Done patching plugins."

    - name: 🔧 Build APK
      run: flutter build apk --release --verbose --android-skip-build-dependency-validation

    - name: 📱 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dengim-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
      
    - name: 🚀 Upload to Firebase App Distribution
      uses: wzieba/Firebase-App-Distribution@v2
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        token: ${{ secrets.FIREBASE_TOKEN }}
        groups: testers
        file: build/app/outputs/flutter-apk/app-release.apk

    - name: 📤 Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-logs
        path: build/app/outputs/logs/
        retention-days: 7

  build-web:
    name: Build Web
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: 📦 Install Dependencies
      run: flutter pub get
      
    - name: 🔧 Build Web
      run: flutter build web --release --base-href "/dengim/"

    - name: 📤 Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/
        retention-days: 30


